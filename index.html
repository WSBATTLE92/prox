            border-left-color: var(--error);

            from {

            }
            to {

                opacity: 1;
            }
        }

        </div>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-film"></i>
                <span>MovieStream</span>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search movies...">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- 3D Carousel -->
        <section class="carousel-section">
            <div class="carousel-container" id="carouselContainer">
                <div class="carousel-track" id="carouselTrack"></div>
                <div class="carousel-controls">
                    <button class="carousel-control" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
                    <button class="carousel-control" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </section>

        <!-- Genre Filter Chips -->

            <div class="genre-chips" id="genreChips">
                <button class="genre-chip active" data-genre="all">All</button>

            </div>
        </section>

        <!-- Movies Grid -->
        <section class="movies-grid-section">
            <div class="movies-grid" id="moviesGrid"></div>
        </section>
    </main>

    <!-- Bottom Navigation -->

        <div class="nav-item active" data-view="home">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" data-view="search">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </div>
        <div class="nav-item" data-view="favorites">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </div>
        <div class="nav-item" data-view="settings">

            <span>Settings</span>
        </div>

            <button class="modal-close" onclick="closeMovieModal()"><i class="fas fa-times"></i></button>
            
            <div class="video-container" id="videoContainer">
                <div class="video-placeholder" id="videoPlaceholder">
                    <img id="modalPoster" src="" alt="Movie poster">
                    <button class="play-button" id="playMovieBtn"><i class="fas fa-play"></i></button>
                </div>
                <div class="video-player" id="videoPlayer" style="display: none;"></div>
            </div>

            <div class="modal-info">
                <h2 class="modal-title" id="modalTitle"></h2>
                
                <div class="modal-meta">
                    <span id="modalGenre"></span>
                    <span class="modal-rating" id="modalRating">
                        <i class="fas fa-star"></i>
                        <span id="ratingValue">0.0</span>
                        (<span id="ratingCount">0</span>)
                    </span>
                </div>

                <p class="modal-description" id="modalDescription"></p>

                <!-- Star Rating -->
                <div class="star-rating" id="starRating">
                    <i class="far fa-star" data-rating="1"></i>
                    <i class="far fa-star" data-rating="2"></i>
                    <i class="far fa-star" data-rating="3"></i>
                    <i class="far fa-star" data-rating="4"></i>
                    <i class="far fa-star" data-rating="5"></i>
                </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ===== FIREBASE CONFIGURATION =====
        // Replace with your Firebase project credentials
        const firebaseConfig = {
  apiKey: "AIzaSyCPuxl6OpIR4yHFz9OVq3GLV8sXs4BCLrg",
  authDomain: "movie-3b46d.firebaseapp.com",
  databaseURL: "https://movie-3b46d-default-rtdb.firebaseio.com",
  projectId: "movie-3b46d",
  storageBucket: "movie-3b46d.firebasestorage.app",
  messagingSenderId: "216929785784",
  appId: "1:216929785784:web:a65ea2e084f60b111a214d"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ===== GLOBAL VARIABLES =====
        let allMovies = [];
        let filteredMovies = [];
        let currentUser = null;
        let currentMovie = null;
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let theme = localStorage.getItem('theme') || 'dark';
        let carouselInterval;
        let currentCarouselIndex = 0;

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
            setupEventListeners();
            applyTheme(theme);
            updateThemeToggle();
        });

        function initializeApp() {
            // Check authentication state
            auth.onAuthStateChanged((user) => {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 500);
                }, 1000);

                if (user) {
                    currentUser = user;
                    updateAccountInfo();
                    loadUserFavorites();
                } else {
                    currentUser = null;
                    updateAccountInfo();
                }
            });

            // Load movies
            loadMovies();
        }

        function setupEventListeners() {
            // Search input
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            
            // Bottom navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => handleNavigation(item.dataset.view));
            });

            // Carousel controls
            document.getElementById('prevSlide').addEventListener('click', () => rotateCarousel('prev'));
            document.getElementById('nextSlide').addEventListener('click', () => rotateCarousel('next'));
            
            // Touch events for carousel
            let touchStartX = 0;
            document.getElementById('carouselContainer').addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            
            document.getElementById('carouselContainer').addEventListener('touchend', (e) => {
                if (!touchStartX) return;
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        rotateCarousel('next');
                    } else {
                        rotateCarousel('prev');
                    }
                }
            });

            // Modal play button
            document.getElementById('playMovieBtn').addEventListener('click', playCurrentMovie);
            
            // Theme toggle
            document.getElementById('themeToggle').addEventListener('change', toggleTheme);

            // Auth tabs
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab));
            });

            // Settings options
            document.getElementById('favoritesSetting').addEventListener('click', () => {
                closeSettingsModal();
                showFavorites();
            });

            document.getElementById('accountSetting').addEventListener('click', () => {
                closeSettingsModal();
                if (currentUser) {
                    handleLogout();
                } else {
                    openAuthModal();
                }
            });

            // Star rating
            document.querySelectorAll('.star-rating i').forEach(star => {
                star.addEventListener('click', () => rateMovie(star.dataset.rating));
                star.addEventListener('mouseenter', () => highlightStars(star.dataset.rating));
                star.addEventListener('mouseleave', () => resetStars());
            });
        }

        // ===== MOVIE FUNCTIONS =====
        async function loadMovies() {
            try {
                const snapshot = await database.ref('movies').once('value');
                const movies = snapshot.val();
                
                allMovies = movies ? Object.entries(movies).map(([id, data]) => ({
                    id,
                    ...data
                })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)) : [];
                
                filteredMovies = [...allMovies];
                displayMovies(filteredMovies);
                updateCarousel();
                updateGenreChips();
            } catch (error) {
                showToast('Error loading movies: ' + error.message, 'error');
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            
            if (!movies || movies.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-film"></i>
                        <p>No movies found</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = movies.map(movie => createMovieCard(movie)).join('');
        }

        function createMovieCard(movie) {
            const averageRating = movie.ratingCount > 0 
                ? (movie.ratingTotal / movie.ratingCount).toFixed(1) 
                : '0.0';

            return `
                <div class="movie-card" onclick="openMovieModal('${movie.id}')">
                    <img src="${movie.poster || 'https://via.placeholder.com/300x450?text=No+Poster'}" 
                         alt="${escapeHtml(movie.title)}"
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
                    <div class="movie-info">
                        <div class="movie-title">${escapeHtml(movie.title)}</div>
                        <div class="movie-genre">${escapeHtml(movie.genre)}</div>
                        <div class="movie-rating">
                            <i class="fas fa-star"></i>
                            <span>${averageRating}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== CAROUSEL FUNCTIONS =====
        function updateCarousel() {
            const latestMovies = allMovies.slice(0, 5);
            const track = document.getElementById('carouselTrack');
            
            if (latestMovies.length === 0) {
                track.innerHTML = '';
                return;
            }

            track.innerHTML = latestMovies.map((movie, index) => `
                <div class="carousel-item" data-index="${index}" onclick="openMovieModal('${movie.id}')">
                    <img src="${movie.poster || 'https://via.placeholder.com/300x450'}" 
                         alt="${escapeHtml(movie.title)}"
                         onerror="this.src='https://via.placeholder.com/300x450'">
                    <div class="movie-title-overlay">${escapeHtml(movie.title)}</div>
                </div>
            `).join('');

            startCarouselRotation();
            positionCarouselItems(0);
        }

        function startCarouselRotation() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                rotateCarousel('next');
            }, 4000);
        }

        function rotateCarousel(direction) {
            const items = document.querySelectorAll('.carousel-item');
            if (items.length === 0) return;

            if (direction === 'next') {
                currentCarouselIndex = (currentCarouselIndex + 1) % items.length;
            } else {
                currentCarouselIndex = (currentCarouselIndex - 1 + items.length) % items.length;
            }

            positionCarouselItems(currentCarouselIndex);
        }

        function positionCarouselItems(activeIndex) {
            const items = document.querySelectorAll('.carousel-item');
            const totalItems = items.length;
            
            items.forEach((item, index) => {
                const offset = index - activeIndex;
                let rotateY, translateZ, opacity, zIndex;

                if (offset === 0) {
                    // Center item
                    rotateY = 0;
                    translateZ = 150;
                    opacity = 1;
                    zIndex = 3;
                } else if (offset === 1 || offset === -totalItems + 1) {
                    // Right item
                    rotateY = -45;
                    translateZ = 50;
                    opacity = 0.8;
                    zIndex = 2;
                } else if (offset === -1 || offset === totalItems - 1) {
                    // Left item
                    rotateY = 45;
                    translateZ = 50;
                    opacity = 0.8;
                    zIndex = 2;
                } else {
                    // Hidden items
                    rotateY = offset > 0 ? -90 : 90;
                    translateZ = 0;
                    opacity = 0;
                    zIndex = 1;
                }

                item.style.transform = `rotateY(${rotateY}deg) translateZ(${translateZ}px)`;
                item.style.opacity = opacity;
                item.style.zIndex = zIndex;
            });
        }

        // ===== GENRE FUNCTIONS =====
        function updateGenreChips() {
            const genres = ['All', ...new Set(allMovies.map(m => m.genre))];
            const chipsContainer = document.getElementById('genreChips');
            
            chipsContainer.innerHTML = genres.map(genre => `
                <button class="genre-chip ${genre === 'All' ? 'active' : ''}" 
                        onclick="filterByGenre('${genre}')">
                    ${genre}
                </button>
            `).join('');
        }

        function filterByGenre(genre) {
            // Update active chip
            document.querySelectorAll('.genre-chip').forEach(chip => {
                chip.classList.toggle('active', chip.textContent === genre);
            });

            // Filter movies
            if (genre === 'All') {
                filteredMovies = [...allMovies];
            } else {
                filteredMovies = allMovies.filter(m => m.genre === genre);
            }

            displayMovies(filteredMovies);
        }

        // ===== SEARCH FUNCTION =====
        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!searchTerm) {
                filteredMovies = [...allMovies];
            } else {
                filteredMovies = allMovies.filter(movie => 
                    movie.title.toLowerCase().includes(searchTerm) ||
                    movie.genre.toLowerCase().includes(searchTerm)
                );
            }

            displayMovies(filteredMovies);
            
            // Update active genre chip
            document.querySelectorAll('.genre-chip').forEach(chip => {
                chip.classList.toggle('active', chip.textContent === 'All');
            });
        }

        // ===== MODAL FUNCTIONS =====
        function openMovieModal(movieId) {
            currentMovie = allMovies.find(m => m.id === movieId);
            if (!currentMovie) return;

            const modal = document.getElementById('movieModal');
            
            // Update modal content
            document.getElementById('modalTitle').textContent = currentMovie.title;
            document.getElementById('modalGenre').textContent = currentMovie.genre;
            document.getElementById('modalDescription').textContent = currentMovie.description;
            document.getElementById('modalPoster').src = currentMovie.poster || 'https://via.placeholder.com/300x450';
            
            // Update rating
            const avgRating = currentMovie.ratingCount > 0 
                ? (currentMovie.ratingTotal / currentMovie.ratingCount).toFixed(1) 
                : '0.0';
            document.getElementById('ratingValue').textContent = avgRating;
            document.getElementById('ratingCount').textContent = currentMovie.ratingCount || 0;

            // Update favorite button
            const isFavorite = favorites.includes(movieId);
            const favBtn = document.getElementById('modalFavoriteBtn');
            favBtn.innerHTML = isFavorite ? 
                '<i class="fas fa-heart"></i> Favorited' : 
                '<i class="far fa-heart"></i> Favorite';
            favBtn.classList.toggle('active', isFavorite);

            // Hide video player, show placeholder
            document.getElementById('videoPlaceholder').style.display = 'flex';
            document.getElementById('videoPlayer').style.display = 'none';
            document.getElementById('videoPlayer').innerHTML = '';

            modal.classList.add('active');
        }

        function closeMovieModal() {
            document.getElementById('movieModal').classList.remove('active');
            // Stop video if playing
            document.getElementById('videoPlayer').innerHTML = '';
            document.getElementById('videoPlaceholder').style.display = 'flex';
            document.getElementById('videoPlayer').style.display = 'none';
        }

        function playCurrentMovie() {
            if (!currentMovie) return;
            
            const embedUrl = convertToEmbedUrl(currentMovie.playUrl);
            if (!embedUrl) {
                showToast('Unable to play this video', 'error');
                return;
            }

            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('videoPlayer').style.display = 'block';
            document.getElementById('videoPlayer').innerHTML = `
                <iframe src="${embedUrl}" 
                        allow="autoplay; fullscreen" 
                        allowfullscreen>
                </iframe>
                <button class="close-video" onclick="closeVideo()">
                    <i class="fas fa-times"></i>
                </button>
            `;
        }

        function closeVideo() {
            document.getElementById('videoPlayer').innerHTML = '';
            document.getElementById('videoPlayer').style.display = 'none';
            document.getElementById('videoPlaceholder').style.display = 'flex';
        }

        function convertToEmbedUrl(url) {
            if (!url) return null;
            
            // YouTube
            const youtubeRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const youtubeMatch = url.match(youtubeRegex);
            
            if (youtubeMatch) {
                return `https://www.youtube.com/embed/${youtubeMatch[1]}?autoplay=1`;
            }
            
            // Vimeo
            const vimeoRegex = /vimeo\.com\/(?:.*\/)?([0-9]+)/i;
            const vimeoMatch = url.match(vimeoRegex);
            
            if (vimeoMatch) {
                return `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1`;
            }
            
            // Dailymotion
            const dailymotionRegex = /dailymotion\.com\/video\/([a-zA-Z0-9]+)/i;
            const dailymotionMatch = url.match(dailymotionRegex);
            
            if (dailymotionMatch) {
                return `https://www.dailymotion.com/embed/video/${dailymotionMatch[1]}?autoplay=1`;
            }
            
            // Direct video file
            if (url.match(/\.(mp4|webm|ogg)$/i)) {
                return url;
            }
            
            return url; // Return original if no pattern matches
        }

        // ===== FAVORITE FUNCTIONS =====
        function toggleFavorite() {
            if (!currentMovie) return;
            
            const movieId = currentMovie.id;
            const index = favorites.indexOf(movieId);
            
            if (index === -1) {
                favorites.push(movieId);
                showToast('Added to favorites');
            } else {
                favorites.splice(index, 1);
                showToast('Removed from favorites');
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            
            // Update button
            const favBtn = document.getElementById('modalFavoriteBtn');
            favBtn.innerHTML = index === -1 ? 
                '<i class="fas fa-heart"></i> Favorited' : 
                '<i class="far fa-heart"></i> Favorite';
            favBtn.classList.toggle('active', index === -1);
            
            updateFavoritesCount();
        }

        function loadUserFavorites() {
            if (currentUser) {
                // Load from Firebase if user is logged in
                database.ref(`users/${currentUser.uid}/favorites`).once('value')
                    .then(snapshot => {
                        const fbFavorites = snapshot.val();
                        if (fbFavorites) {
                            favorites = fbFavorites;
                            localStorage.setItem('favorites', JSON.stringify(favorites));
                        }
                        updateFavoritesCount();
                    });
            } else {
                favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                updateFavoritesCount();
            }
        }

        function showFavorites() {
            const favoriteMovies = allMovies.filter(m => favorites.includes(m.id));
            
            // Update active nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === 'favorites');
            });
            
            // Display favorites
            if (favoriteMovies.length === 0) {
                document.getElementById('moviesGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-heart"></i>
                        <p>No favorite movies yet</p>
                    </div>
                `;
            } else {
                displayMovies(favoriteMovies);
            }
        }

        // ===== RATING FUNCTIONS =====
        async function rateMovie(rating) {
            if (!currentUser) {
                showToast('Please login to rate movies', 'error');
                openAuthModal();
                return;
            }

            if (!currentMovie) return;

            try {
                const movieRef = database.ref(`movies/${currentMovie.id}`);
                const snapshot = await movieRef.once('value');
                const movie = snapshot.val();

                const newRatingTotal = (movie.ratingTotal || 0) + parseInt(rating);
                const newRatingCount = (movie.ratingCount || 0) + 1;

                await movieRef.update({
                    ratingTotal: newRatingTotal,
                    ratingCount: newRatingCount
                });

                // Update local movie
                currentMovie.ratingTotal = newRatingTotal;
                currentMovie.ratingCount = newRatingCount;

                // Update display
                const avgRating = (newRatingTotal / newRatingCount).toFixed(1);
                document.getElementById('ratingValue').textContent = avgRating;
                document.getElementById('ratingCount').textContent = newRatingCount;

                showToast('Thank you for rating!');
            } catch (error) {
                showToast('Error rating movie: ' + error.message, 'error');
            }
        }

        function highlightStars(rating) {
            document.querySelectorAll('.star-rating i').forEach((star, index) => {
                if (index < rating) {
                    star.className = 'fas fa-star';
                } else {
                    star.className = 'far fa-star';
                }
            });
        }

        function resetStars() {
            document.querySelectorAll('.star-rating i').forEach(star => {
                star.className = 'far fa-star';
            });
        }

        // ===== REPORT FUNCTION =====
        async function reportBrokenLink() {
            if (!currentMovie) return;

            try {
                await database.ref('reports').push({
                    movieId: currentMovie.id,
                    movieTitle: currentMovie.title,
                    userId: currentUser?.uid || 'anonymous',
                    timestamp: Date.now()
                });

                showToast('Report submitted. Thank you!');
            } catch (error) {
                showToast('Error submitting report: ' + error.message, 'error');
            }
        }

        // ===== AUTH FUNCTIONS =====
        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
            // Clear forms
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('signupName').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirmPassword').value = '';
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                closeAuthModal();
                showToast('Logged in successfully');
            } catch (error) {
                showToast('Login failed: ' + error.message, 'error');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                
                // Save user data
                await database.ref(`users/${result.user.uid}`).set({
                    name,
                    email,
                    createdAt: Date.now()
                });

                closeAuthModal();
                showToast('Account created successfully');
            } catch (error) {
                showToast('Signup failed: ' + error.message, 'error');
            }
        }

        async function handleLogout() {
            try {
                await auth.signOut();
                favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                showToast('Logged out successfully');
                updateAccountInfo();
            } catch (error) {
                showToast('Error logging out: ' + error.message, 'error');
            }
        }

        function updateAccountInfo() {
            const statusEl = document.getElementById('accountStatus');
            const emailEl = document.getElementById('accountEmail');
            
            if (currentUser) {
                statusEl.textContent = 'Logged In';
                emailEl.textContent = currentUser.email;
            } else {
                statusEl.textContent = 'Login / Sign Up';
                emailEl.textContent = 'Sign in to sync your data';
            }
        }

        // ===== NAVIGATION =====
        function handleNavigation(view) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === view);
            });

            switch(view) {
                case 'home':
                    displayMovies(filteredMovies);
                    break;
                case 'search':
                    document.getElementById('searchInput').focus();
                    break;
                case 'favorites':
                    showFavorites();
                    break;
                case 'settings':
                    openSettingsModal();
                    break;
            }
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // ===== THEME FUNCTIONS =====
        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            applyTheme(theme);
            localStorage.setItem('theme', theme);
            updateThemeToggle();
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        }

        function updateThemeToggle() {
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.checked = theme === 'light';
            }
        }

        // ===== HELPER FUNCTIONS =====
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s reverse';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        function updateFavoritesCount() {
            document.getElementById('favoritesCount').textContent = favorites.length;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Add event listeners for modal buttons
        document.getElementById('modalPlayBtn').addEventListener('click', playCurrentMovie);
        document.getElementById('modalDownloadBtn').addEventListener('click', () => {
            if (currentMovie?.downloadUrl) {
                window.open(currentMovie.downloadUrl, '_blank');
            }
        });
        document.getElementById('modalFavoriteBtn').addEventListener('click', toggleFavorite);
        document.getElementById('modalReportBtn').addEventListener('click', reportBrokenLink);

        // Close modals when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });
    </script>
